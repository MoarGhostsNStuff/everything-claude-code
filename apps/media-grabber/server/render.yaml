# One-click deploy on Render (https://render.com). Free tier works.
# Render builds the Dockerfile and gives you an https URL to use as the
# "Backend URL" in the Grab app's settings.
services:
  - type: web
    name: grab
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8080"
